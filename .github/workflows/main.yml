name: Sayura MD Bot Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: sayura-bot-cluster
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          sudo curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          echo "✅ System dependencies installed"

      - name: Install Node dependencies
        run: |
          npm install
          echo "✅ Node dependencies ready"

      - name: Start Bot
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          NODE_ENV: production
        run: |
          echo "🚀 Bot starting..."
          echo "🕐 Start time: $(date -u)"
          npm start
          EXIT_CODE=$?
          echo "🔴 Bot stopped with exit code: $EXIT_CODE"
          exit $EXIT_CODE

      - name: Auto-restart workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "🔄 Restarting workflow..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/node.yml/dispatches \
            -d '{"ref":"main"}')

          if [ "$HTTP_STATUS" -eq 204 ]; then
            echo "✅ Restart triggered (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Restart failed — HTTP $HTTP_STATUS"
            exit 1
          fi
